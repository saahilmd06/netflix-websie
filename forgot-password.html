<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            color: white;
            font-family: Poppins, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #111;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 5px;
            outline: none;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 5px;
            background: red;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: darkred;
        }

        a {
            display: block;
            margin-top: 20px;
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Forgot Password</h1>

        <p>Enter your email address or phone number</p>

        <form id="forgotForm">
            <input type="email" id="email" placeholder="Email Address">
            <input type="tel" id="phone" placeholder="Phone Number" pattern="[0-9]{10}">
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" id="resetBtn" style="margin-top: 0; flex: 1;">Reset Password</button>
                <button type="button" id="otpBtn" style="margin-top: 0; flex: 1; background-color: rgba(128, 128, 128, 0.4); border: 1px solid #555;">Get OTP</button>
            </div>
        </form>

        <div id="message" style="margin-top: 20px; font-size: 14px;"></div>

        <a href="index.html">Back to Home</a>
    </div>

    <script src="src/auth.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const messageDiv = document.getElementById('message');
            const resetBtn = document.getElementById('resetBtn');

            if (!email && !phone) {
                messageDiv.style.color = '#ff0000';
                messageDiv.textContent = 'Please enter either an email address or a phone number.';
                return;
            }

            resetBtn.disabled = true;
            resetBtn.textContent = 'Sending...';
            messageDiv.textContent = '';

            try {
                const identifier = email || phone;
                const result = await auth.resetPassword(identifier);
                messageDiv.style.color = '#00ff00';
                messageDiv.textContent = result.message;
            } catch (err) {
                messageDiv.style.color = '#ff0000';
                messageDiv.textContent = err.message;
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = 'Reset Password';
            }
        });

        // Phone Number Limit Logic
        const phoneInput = document.getElementById('phone');
        if (phoneInput) {
            phoneInput.addEventListener('input', (e) => {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length > 10) value = value.slice(0, 10);
                e.target.value = value;
            });
        }

        // Get OTP Logic
        document.getElementById('otpBtn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const messageDiv = document.getElementById('message');

            if (!email && !phone) {
                messageDiv.style.color = '#ff0000';
                messageDiv.textContent = 'Please enter either an email address or a phone number to get OTP.';
                return;
            }

            messageDiv.style.color = '#00ff00';
            messageDiv.textContent = 'OTP sent to your registered mobile/email (simulated)!';
        });
    </script>

</body>

</html>
